<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>fanhist</title>
<script>
  // Applied before first paint so switching themes doesn't flash the wrong one.
  (function () {
    var t = localStorage.getItem('fanhist_theme');
    if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
  })();
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #f4f5f7; --panel: #ffffff; --accent: #e8562f; --text: #1a1a1a; --muted: #666;
    --input-bg: #f0f1f3; --border: #d5d7dc; --code-bg: #eceef1; --ok: #1a9850; --fail: #d9363e;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14161a; --panel: #1e2127; --accent: #e8562f; --text: #eee; --muted: #999;
      --input-bg: #2a2e36; --border: #3a3f4a; --code-bg: #171a1f; --ok: #4dd67a; --fail: #ff6b6b;
    }
  }
  :root[data-theme="dark"] {
    --bg: #14161a; --panel: #1e2127; --accent: #e8562f; --text: #eee; --muted: #999;
    --input-bg: #2a2e36; --border: #3a3f4a; --code-bg: #171a1f; --ok: #4dd67a; --fail: #ff6b6b;
  }
  :root[data-theme="light"] {
    --bg: #f4f5f7; --panel: #ffffff; --accent: #e8562f; --text: #1a1a1a; --muted: #666;
    --input-bg: #f0f1f3; --border: #d5d7dc; --code-bg: #eceef1; --ok: #1a9850; --fail: #d9363e;
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, Segoe UI, sans-serif; margin: 0; padding: 24px; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  h1 { color: var(--accent); font-weight: 700; letter-spacing: 0.5px; margin: 0; }
  #themeToggle { min-width: 0; padding: 6px 10px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin: 16px 0 24px; }
  .card { background: var(--panel); border-radius: 10px; padding: 16px 20px; }
  .card .label { color: var(--muted); font-size: 0.85em; text-transform: uppercase; letter-spacing: 0.5px; }
  .card .value { font-size: 2em; font-weight: 600; margin-top: 4px; }
  .panel { background: var(--panel); border-radius: 10px; padding: 20px; margin-bottom: 24px; }
  select, button, input { background: var(--input-bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; }
  button { background: var(--accent); color: #fff; border: none; cursor: pointer; font-weight: 600; }
  button:hover { opacity: 0.9; }
  table { width: 100%; border-collapse: collapse; margin-top: 12px; }
  th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border); }
  .error { color: var(--fail); margin-top: 10px; }
  canvas { max-height: 320px; }
  h3 { margin: 20px 0 8px; font-size: 1em; color: var(--text); border-bottom: 1px solid var(--border); padding-bottom: 6px; }
  h3:first-of-type { margin-top: 0; }
  .field-row { display: flex; flex-wrap: wrap; gap: 14px; margin: 8px 0; }
  .field-row label, label.block { display: flex; flex-direction: column; gap: 4px; font-size: 0.85em; color: var(--muted); }
  label.block { margin: 10px 0; }
  .field-row input, .field-row select { color: var(--text); min-width: 180px; }
  textarea { background: var(--input-bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 8px; font-family: ui-monospace, monospace; font-size: 0.85em; resize: vertical; width: 100%; box-sizing: border-box; }
  .test-result { margin-left: 10px; font-size: 0.9em; }
  .test-result.ok { color: var(--ok); }
  .test-result.fail { color: var(--fail); }
  .ssh-key-box { background: var(--code-bg); border-radius: 8px; padding: 12px 14px; margin: 12px 0; }
  .muted { color: var(--muted); font-size: 0.9em; }
  .sensor-checklist { display: flex; flex-wrap: wrap; gap: 8px 20px; margin: 4px 0 12px; }
  .sensor-check { display: flex; align-items: center; gap: 6px; font-size: 0.9em; color: var(--text); cursor: pointer; }
  .sensor-check input { margin: 0; }
  .sensor-group-heading { color: var(--muted); font-size: 0.8em; text-transform: uppercase; letter-spacing: 0.5px; margin: 10px 0 2px; }
  .sensor-group-heading:first-child { margin-top: 0; }
</style>
</head>
<body>
  <div class="top-bar">
    <h1>fanhist</h1>
    <select id="themeToggle" title="Theme">
      <option value="system">System theme</option>
      <option value="light">Light</option>
      <option value="dark">Dark</option>
    </select>
  </div>

  <div class="grid">
    <div class="card"><div class="label">CPU / Inlet</div><div class="value" id="cpuTemp">–</div></div>
    <div class="card"><div class="label">Disk (<span id="diskCount">0</span> disks, avg)</div><div class="value" id="diskTemp">–</div></div>
    <div class="card"><div class="label">Effective</div><div class="value" id="effTemp">–</div></div>
    <div class="card"><div class="label">Fan speed</div><div class="value" id="fanPct">–</div></div>
  </div>
  <div class="error" id="errorBox"></div>

  <div class="panel">
    <h2>History</h2>
    <select id="rangeSelect">
      <option value="6">6 hours</option>
      <option value="24" selected>24 hours</option>
      <option value="168">7 days</option>
    </select>
    <canvas id="historyChart"></canvas>
  </div>

  <div class="panel">
    <h2>Fan curve</h2>
    <canvas id="curveChart" style="max-height: 220px"></canvas>
    <table id="curveTable"></table>
    <button onclick="addPoint()">+ Add point</button>
    <button onclick="saveCurve()">Save</button>
  </div>

  <div class="panel">
    <h2>Settings</h2>

    <h3>iDRAC</h3>
    <div class="field-row">
      <label>Host/IP<input id="set_idrac_host" type="text" placeholder="192.168.50.11"></label>
      <label>User<input id="set_idrac_user" type="text" placeholder="root"></label>
      <label>Password<input id="set_idrac_pass" type="password"></label>
    </div>
    <button onclick="testIdrac(false, true)">Test connection</button>
    <span id="idracTestResult" class="test-result"></span>
    <div id="cpuSensorList"></div>
    <label class="block" style="max-width: 240px">CPU sensors combine
      <select id="set_cpu_temp_aggregation">
        <option value="max">max (safest)</option>
        <option value="avg">average</option>
        <option value="min">min</option>
      </select>
    </label>

    <h3>Disk temperature (optional, via SSH)</h3>
    <div class="field-row">
      <label>SSH host<input id="set_disk_ssh_host" type="text" placeholder="empty = disabled"></label>
      <label>SSH user<input id="set_disk_ssh_user" type="text" placeholder="root"></label>
      <label>Combine
        <select id="set_disk_temp_aggregation">
          <option value="avg">average</option>
          <option value="max">max</option>
          <option value="min">min</option>
        </select>
      </label>
    </div>
    <label class="block">Command (one "name:temp" per line, m°C or °C — a bare number per line also works but won't have a real disk name)
      <textarea id="set_disk_temp_cmd" rows="3"></textarea>
    </label>

    <div class="ssh-key-box">
      <div id="sshKeyStatus" class="muted">SSH key: loading...</div>
      <button onclick="generateSshKey()">Generate (regenerate) key</button>
      <div id="sshPubKeyWrap" style="display:none">
        <label class="block">Public key — paste this into <code>authorized_keys</code> on your NAS/host for the SSH user above
          <textarea id="sshPubKey" readonly rows="2"></textarea>
        </label>
        <button onclick="copyPubKey()">Copy</button>
      </div>
    </div>
    <button onclick="testDisk()">Test disk connection</button>
    <span id="diskTestResult" class="test-result"></span>
    <div id="diskList" class="sensor-checklist"></div>

    <h3>General</h3>
    <div class="field-row">
      <label>Interval (s)<input id="set_interval_seconds" type="number" min="5"></label>
      <label>IPMI timeout (s)<input id="set_ipmi_timeout" type="number" min="1"></label>
      <label>Retention (days)<input id="set_history_retention_days" type="number" min="1"></label>
    </div>

    <button onclick="saveSettings()">Save settings</button>
    <span id="settingsSaved" class="test-result"></span>
  </div>

  <div class="muted" id="versionFooter" style="text-align:center; margin: -8px 0 8px;"></div>

<script>
let curve = [];

function currentTextColor() {
  return getComputedStyle(document.documentElement).getPropertyValue('--text').trim();
}

function setTheme(value, redraw) {
  const root = document.documentElement;
  if (value === 'light' || value === 'dark') {
    root.setAttribute('data-theme', value);
    localStorage.setItem('fanhist_theme', value);
  } else {
    root.removeAttribute('data-theme');
    localStorage.removeItem('fanhist_theme');
  }
  Chart.defaults.color = currentTextColor();
  if (redraw) {
    refreshHistory();
    renderCurveChart();
  }
}

const savedTheme = localStorage.getItem('fanhist_theme');
document.getElementById('themeToggle').value = (savedTheme === 'light' || savedTheme === 'dark') ? savedTheme : 'system';
setTheme(savedTheme || 'system', false);
document.getElementById('themeToggle').addEventListener('change', e => setTheme(e.target.value, true));

async function refreshStatus() {
  const r = await fetch('/api/status');
  const s = await r.json();
  document.getElementById('cpuTemp').textContent = s.cpu_temp != null ? s.cpu_temp.toFixed(1) + '°C' : '–';
  document.getElementById('diskTemp').textContent = s.disk_temp != null ? s.disk_temp.toFixed(1) + '°C' : '–';
  document.getElementById('diskCount').textContent = s.disk_count || 0;
  document.getElementById('effTemp').textContent = s.effective_temp != null ? s.effective_temp.toFixed(1) + '°C' : '–';
  document.getElementById('fanPct').textContent = s.fan_percent != null ? Math.round(s.fan_percent) + '%' : '–';
  document.getElementById('errorBox').textContent = s.last_error || '';
}

let chart;
async function refreshHistory() {
  const hours = document.getElementById('rangeSelect').value;
  const r = await fetch('/api/history?hours=' + hours);
  const data = await r.json();
  const labels = data.map(d => new Date(d.ts + 'Z').toLocaleTimeString());
  const eff = data.map(d => d.effective_temp);
  const fan = data.map(d => d.fan_percent);

  if (chart) chart.destroy();
  const ctx = document.getElementById('historyChart').getContext('2d');
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Temp (°C)', data: eff, borderColor: '#e8562f', yAxisID: 'y', tension: 0.2, pointRadius: 0, pointHitRadius: 8 },
        { label: 'Fan (%)', data: fan, borderColor: '#4da3ff', yAxisID: 'y1', tension: 0.2, pointRadius: 0, pointHitRadius: 8 },
      ],
    },
    options: {
      interaction: { mode: 'index', intersect: false },
      plugins: { tooltip: { mode: 'index', intersect: false } },
      scales: {
        y: {
          position: 'left',
          title: { display: true, text: 'Temp (°C)', color: '#e8562f' },
          ticks: { color: '#e8562f' },
          grid: { color: 'rgba(232, 86, 47, 0.12)' },
        },
        y1: {
          position: 'right',
          title: { display: true, text: 'Fan (%)', color: '#4da3ff' },
          ticks: { color: '#4da3ff' },
          grid: { drawOnChartArea: false },
        },
      },
    },
  });
}

const CURVE_TEMP_SNAP = 1; // snap to whole degrees, not a coarse grid

let curveChart;
let curveDragIndex = null;

function renderCurveChart() {
  const points = [...curve]
    .sort((a, b) => a.temp - b.temp)
    .map(p => ({ x: p.temp, y: p.percent }));
  if (curveChart) curveChart.destroy();
  curveDragIndex = null;
  const canvas = document.getElementById('curveChart');
  const ctx = canvas.getContext('2d');
  curveChart = new Chart(ctx, {
    type: 'line',
    data: {
      datasets: [{
        label: 'Fan %',
        data: points,
        borderColor: '#e8562f',
        backgroundColor: '#e8562f',
        tension: 0,
        pointRadius: 5,
        pointHoverRadius: 7,
        pointHitRadius: 10,
      }],
    },
    options: {
      parsing: false,
      animation: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { type: 'linear', title: { display: true, text: 'Temp (°C)' }, min: 0 },
        y: { title: { display: true, text: 'Fan %' }, min: 0, max: 100 },
      },
    },
  });

  // Hand-rolled drag: assigning to on* (not addEventListener) so re-rendering
  // the chart replaces the handler instead of stacking a new one each time —
  // the underlying <canvas> element is reused across renderCurveChart() calls.
  canvas.onmousedown = (e) => {
    const hit = curveChart.getElementsAtEventForMode(e, 'nearest', { intersect: true }, false);
    if (hit.length) {
      curveDragIndex = hit[0].index;
      canvas.style.cursor = 'grabbing';
    }
  };
  canvas.onmousemove = (e) => {
    if (curveDragIndex === null) return;
    const rect = canvas.getBoundingClientRect();
    let temp = curveChart.scales.x.getValueForPixel(e.clientX - rect.left);
    let percent = curveChart.scales.y.getValueForPixel(e.clientY - rect.top);
    temp = Math.max(0, Math.round(temp / CURVE_TEMP_SNAP) * CURVE_TEMP_SNAP);
    percent = Math.max(0, Math.min(100, Math.round(percent)));
    curveChart.data.datasets[0].data[curveDragIndex] = { x: temp, y: percent };
    curveChart.update('none');
  };
  const endDrag = () => {
    if (curveDragIndex === null) return;
    curveDragIndex = null;
    canvas.style.cursor = '';
    curve = curveChart.data.datasets[0].data
      .map(p => ({ temp: p.x, percent: p.y }))
      .sort((a, b) => a.temp - b.temp);
    renderCurveTableOnly();
  };
  canvas.onmouseup = endDrag;
  canvas.onmouseleave = endDrag;
}

function updatePoint(i, field, value) {
  curve[i][field] = parseFloat(value);
  renderCurveChart();
}

function renderCurveTableOnly() {
  const table = document.getElementById('curveTable');
  table.innerHTML = '<tr><th>Temp (°C)</th><th>Fan (%)</th><th></th></tr>';
  curve.forEach((p, i) => {
    const row = document.createElement('tr');
    row.innerHTML = `
      <td><input type="number" value="${p.temp}" onchange="updatePoint(${i}, 'temp', this.value)"></td>
      <td><input type="number" value="${p.percent}" onchange="updatePoint(${i}, 'percent', this.value)"></td>
      <td><button onclick="removePoint(${i})">x</button></td>`;
    table.appendChild(row);
  });
}

function renderCurveTable() {
  renderCurveTableOnly();
  renderCurveChart();
}

function addPoint() {
  const usedTemps = curve.map(p => p.temp);
  let temp = 50;
  while (usedTemps.includes(temp)) temp += CURVE_TEMP_SNAP;
  curve.push({ temp, percent: 30 });
  renderCurveTable();
}

function removePoint(i) {
  curve.splice(i, 1);
  renderCurveTable();
}

async function saveCurve() {
  await fetch('/api/curve', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(curve),
  });
}

async function loadCurve() {
  const r = await fetch('/api/curve');
  curve = await r.json();
  renderCurveTable();
}

let cpuSensors = [];
let selectedCpuSensors = [];

const SENSOR_CATEGORY_ORDER = ['CPU', 'PCI', 'Drive', 'GPU', 'Chassis', 'Inlet / Ambient', 'Exhaust', 'Other'];

const ENTITY_LABEL_CATEGORY = {
  'Processor': 'CPU',
  'System Board': 'Chassis',
  'Air Inlet': 'Inlet / Ambient',
};

function sensorCategory(s) {
  // Name keywords first — a name like "Exhaust Temp" is more specific than
  // its entity ID (which is often just the generic "System Board" for any
  // board-mounted sensor). Entity ID is only consulted when the name gives
  // no clue at all, i.e. truly anonymous sensors like a bare "Temp".
  const n = s.name.toLowerCase();
  if (n.includes('cpu') || n.includes('proc')) return 'CPU';
  if (n.includes('pci')) return 'PCI';
  if (n.includes('drive') || n.includes('disk') || n.includes('hdd') || n.includes('ssd')) return 'Drive';
  if (n.includes('gpu')) return 'GPU';
  if (n.includes('chassis') || n.includes('board') || n.includes('system') || n.includes('planar')) return 'Chassis';
  if (n.includes('inlet') || n.includes('ambient')) return 'Inlet / Ambient';
  if (n.includes('exhaust')) return 'Exhaust';
  if (s.entity_label && ENTITY_LABEL_CATEGORY[s.entity_label]) {
    return ENTITY_LABEL_CATEGORY[s.entity_label];
  }
  return 'Other';
}

function renderCpuSensorChecklist() {
  const container = document.getElementById('cpuSensorList');
  if (cpuSensors.length === 0) {
    container.innerHTML = '<div class="muted">No sensors listed yet — click Test connection.</div>';
    return;
  }
  container.innerHTML = '';

  const groups = {};
  cpuSensors.forEach(s => {
    const cat = sensorCategory(s);
    (groups[cat] = groups[cat] || []).push(s);
  });

  SENSOR_CATEGORY_ORDER.forEach(cat => {
    const list = groups[cat];
    if (!list || list.length === 0) return;

    const heading = document.createElement('div');
    heading.className = 'sensor-group-heading';
    heading.textContent = cat;
    container.appendChild(heading);

    const row = document.createElement('div');
    row.className = 'sensor-checklist';
    list.forEach(s => {
      const label = document.createElement('label');
      label.className = 'sensor-check';
      const checked = selectedCpuSensors.includes(s.name) ? 'checked' : '';
      const readingText = s.reading != null ? ` — ${s.reading}°C` : '';
      const instanceText = s.instance != null ? ` #${s.instance}` : '';
      const critText = s.upper_crit != null ? ` (crit ${s.upper_crit}°C)` : '';
      const entityText = s.entity_label ? ` · ${s.entity_label}` : (s.entity ? ` · entity ${s.entity}` : '');
      label.innerHTML = `<input type="checkbox" value="${s.name}" ${checked}>${s.name}${instanceText}${readingText}${critText}${entityText}`;
      row.appendChild(label);
    });
    container.appendChild(row);
  });
}

async function loadSettings() {
  const r = await fetch('/api/settings');
  const s = await r.json();
  document.getElementById('set_idrac_host').value = s.idrac_host || '';
  document.getElementById('set_idrac_user').value = s.idrac_user || '';
  document.getElementById('set_idrac_pass').value = '';
  document.getElementById('set_idrac_pass').placeholder = s.idrac_pass === '__SET__' ? '•••••• (leave blank to keep unchanged)' : '(not set yet)';
  document.getElementById('set_cpu_temp_aggregation').value = s.cpu_temp_aggregation || 'max';
  selectedCpuSensors = s.cpu_sensor_names || [];
  document.getElementById('set_disk_ssh_host').value = s.disk_ssh_host || '';
  document.getElementById('set_disk_ssh_user').value = s.disk_ssh_user || '';
  document.getElementById('set_disk_temp_aggregation').value = s.disk_temp_aggregation || 'avg';
  document.getElementById('set_disk_temp_cmd').value = s.disk_temp_cmd || '';
  document.getElementById('set_interval_seconds').value = s.interval_seconds;
  document.getElementById('set_ipmi_timeout').value = s.ipmi_timeout;
  document.getElementById('set_history_retention_days').value = s.history_retention_days;

  selectedDiskNames = s.disk_names || [];
  if (s.disk_ssh_host) {
    testDisk(true); // quiet, one-shot — just populate the checklist
  }

  if (s.idrac_host && s.idrac_pass === '__SET__') {
    testIdrac(true, false); // quiet, one-shot — just populate the checklist, no repeating poll
  } else {
    renderCpuSensorChecklist();
  }
}

async function saveSettings() {
  const cpu_sensor_names = Array.from(
    document.querySelectorAll('#cpuSensorList input[type=checkbox]:checked')
  ).map(cb => cb.value);
  const disk_names = Array.from(
    document.querySelectorAll('#diskList input[type=checkbox]:checked')
  ).map(cb => cb.value);

  const payload = {
    idrac_host: document.getElementById('set_idrac_host').value.trim(),
    idrac_user: document.getElementById('set_idrac_user').value.trim(),
    cpu_sensor_names,
    cpu_temp_aggregation: document.getElementById('set_cpu_temp_aggregation').value,
    disk_ssh_host: document.getElementById('set_disk_ssh_host').value.trim(),
    disk_ssh_user: document.getElementById('set_disk_ssh_user').value.trim(),
    disk_names,
    disk_temp_aggregation: document.getElementById('set_disk_temp_aggregation').value,
    disk_temp_cmd: document.getElementById('set_disk_temp_cmd').value,
    interval_seconds: parseInt(document.getElementById('set_interval_seconds').value, 10),
    ipmi_timeout: parseInt(document.getElementById('set_ipmi_timeout').value, 10),
    history_retention_days: parseInt(document.getElementById('set_history_retention_days').value, 10),
  };
  const passVal = document.getElementById('set_idrac_pass').value;
  if (passVal) payload.idrac_pass = passVal;

  const msg = document.getElementById('settingsSaved');
  const r = await fetch('/api/settings', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  });
  if (r.ok) {
    msg.textContent = 'Saved ✓';
    msg.className = 'test-result ok';
    loadSettings();
  } else {
    const err = await r.json();
    msg.textContent = 'Error: ' + (err.error || r.status);
    msg.className = 'test-result fail';
  }
  setTimeout(() => { msg.textContent = ''; }, 4000);
}

function idracFormOverrides() {
  const overrides = {
    idrac_host: document.getElementById('set_idrac_host').value.trim(),
    idrac_user: document.getElementById('set_idrac_user').value.trim(),
  };
  const passVal = document.getElementById('set_idrac_pass').value;
  if (passVal) overrides.idrac_pass = passVal;
  return overrides;
}

function diskFormOverrides() {
  return {
    disk_ssh_host: document.getElementById('set_disk_ssh_host').value.trim(),
    disk_ssh_user: document.getElementById('set_disk_ssh_user').value.trim(),
    disk_temp_aggregation: document.getElementById('set_disk_temp_aggregation').value,
    disk_temp_cmd: document.getElementById('set_disk_temp_cmd').value,
  };
}

let cpuSensorRefreshTimer = null;
let cpuSensorRefreshCount = 0;
// Older iDRACs (e.g. iDRAC7) only support a handful of concurrent IPMI
// sessions. Each refresh here opens its own ipmitool session, competing
// with the control loop's own periodic reads — so this only runs for a
// bounded diagnostic window, not indefinitely in the background.
const CPU_SENSOR_REFRESH_MAX = 24; // 24 * 5s = 2 minutes

function stopCpuSensorRefresh(note) {
  if (cpuSensorRefreshTimer) {
    clearInterval(cpuSensorRefreshTimer);
    cpuSensorRefreshTimer = null;
  }
  cpuSensorRefreshCount = 0;
  if (note) {
    const el = document.getElementById('idracTestResult');
    el.textContent = note;
    el.className = 'test-result ok';
  }
}

// startWatch: only an explicit user click should kick off the repeating
// 5s poll — the automatic call on page load (loadSettings) just populates
// the checklist once, so simply having the dashboard open doesn't create
// ongoing IPMI session contention with the control loop.
async function testIdrac(silent, startWatch) {
  // preserve whatever's currently checked before re-rendering
  const currentlyChecked = Array.from(
    document.querySelectorAll('#cpuSensorList input[type=checkbox]:checked')
  ).map(cb => cb.value);
  if (currentlyChecked.length) selectedCpuSensors = currentlyChecked;

  const el = document.getElementById('idracTestResult');
  if (!silent) {
    el.textContent = 'Testing connection...';
    el.className = 'test-result';
  }
  const r = await fetch('/api/sensors/idrac', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(idracFormOverrides()),
  });
  const res = await r.json();
  if (res.ok) {
    cpuSensors = res.sensors;
    renderCpuSensorChecklist();

    if (startWatch && !cpuSensorRefreshTimer) {
      cpuSensorRefreshCount = 0;
      cpuSensorRefreshTimer = setInterval(() => {
        cpuSensorRefreshCount++;
        if (cpuSensorRefreshCount >= CPU_SENSOR_REFRESH_MAX) {
          stopCpuSensorRefresh('Live refresh stopped (to avoid competing with the control loop for IPMI sessions) — click Test connection to resume it.');
          return;
        }
        testIdrac(true, false);
      }, 5000);
    }

    // Message reflects whether a watch is currently active, not just what
    // triggered this particular call, so repeat ticks keep the right text.
    if (cpuSensorRefreshTimer) {
      el.textContent = `Connected — found ${res.sensors.length} temperature sensor(s). Readings refresh every 5s for 2 minutes — `
        + `touch/stress a component and watch which one moves to identify unnamed sensors.`;
    } else {
      el.textContent = `Connected — found ${res.sensors.length} temperature sensor(s), pick which to use below.`;
    }
    el.className = 'test-result ok';
  } else if (!silent) {
    el.textContent = res.message;
    el.className = 'test-result fail';
  }
}

let diskSensors = [];
let selectedDiskNames = [];

function renderDiskChecklist() {
  const container = document.getElementById('diskList');
  if (diskSensors.length === 0) {
    container.innerHTML = '';
    return;
  }
  container.innerHTML = '';
  diskSensors.forEach(d => {
    const label = document.createElement('label');
    label.className = 'sensor-check';
    // nothing selected yet (fresh setup) defaults to "all" to match how
    // disk temps behaved before per-disk selection existed
    const checked = selectedDiskNames.length === 0 || selectedDiskNames.includes(d.name) ? 'checked' : '';
    label.innerHTML = `<input type="checkbox" value="${d.name}" ${checked}>${d.name} — ${d.reading.toFixed(1)}°C`;
    container.appendChild(label);
  });
}

async function testDisk(silent) {
  const currentlyChecked = Array.from(
    document.querySelectorAll('#diskList input[type=checkbox]:checked')
  ).map(cb => cb.value);
  if (currentlyChecked.length) selectedDiskNames = currentlyChecked;

  const el = document.getElementById('diskTestResult');
  if (!silent) {
    el.textContent = 'Testing...';
    el.className = 'test-result';
  }
  const r = await fetch('/api/test/disk', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(diskFormOverrides()),
  });
  const res = await r.json();
  if (res.ok) {
    diskSensors = res.disks || [];
    renderDiskChecklist();
    el.textContent = `Found ${diskSensors.length} disk(s), pick which to include below.`;
    el.className = 'test-result ok';
  } else if (!silent) {
    el.textContent = res.message;
    el.className = 'test-result fail';
  }
}

async function loadSshKey() {
  const r = await fetch('/api/ssh-key');
  const s = await r.json();
  const status = document.getElementById('sshKeyStatus');
  const wrap = document.getElementById('sshPubKeyWrap');
  if (s.exists) {
    status.textContent = 'SSH key: present';
    document.getElementById('sshPubKey').value = s.public_key;
    wrap.style.display = 'block';
  } else {
    status.textContent = 'SSH key: not generated yet';
    wrap.style.display = 'none';
  }
}

async function generateSshKey() {
  if (document.getElementById('sshKeyStatus').textContent.includes('present')) {
    if (!confirm('This replaces the existing key. You will need to add the new public key to your NAS/host again. Continue?')) return;
  }
  const r = await fetch('/api/ssh-key/generate', { method: 'POST' });
  const s = await r.json();
  if (r.ok) {
    document.getElementById('sshKeyStatus').textContent = 'SSH key: present (newly generated)';
    document.getElementById('sshPubKey').value = s.public_key;
    document.getElementById('sshPubKeyWrap').style.display = 'block';
  } else {
    alert('Key generation failed: ' + (s.error || r.status));
  }
}

function copyPubKey() {
  const ta = document.getElementById('sshPubKey');
  ta.select();
  navigator.clipboard.writeText(ta.value).catch(() => document.execCommand('copy'));
}

async function loadVersion() {
  const r = await fetch('/api/version');
  const s = await r.json();
  document.getElementById('versionFooter').textContent = 'build: ' + s.git_sha.slice(0, 7);
}

document.getElementById('rangeSelect').addEventListener('change', refreshHistory);

loadCurve();
loadSettings();
loadSshKey();
loadVersion();
refreshStatus();
refreshHistory();
setInterval(refreshStatus, 5000);
setInterval(refreshHistory, 60000);
</script>
