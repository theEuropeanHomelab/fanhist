{% extends "base.html" %}
{% block head_extra %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
{% endblock %}
{% block content %}
  <div class="grid">
    <div class="card"><div class="label">CPU / Inlet</div><div class="value" id="cpuTemp">–</div></div>
    <div class="card"><div class="label">Disk (<span id="diskCount">0</span> disks, avg)</div><div class="value" id="diskTemp">–</div></div>
    <div class="card"><div class="label">Effective</div><div class="value" id="effTemp">–</div></div>
    <div class="card"><div class="label">Fan speed</div><div class="value" id="fanPct">–</div></div>
  </div>
  <div class="error" id="errorBox"></div>

  <div class="panel">
    <h2>History</h2>
    <select id="rangeSelect">
      <option value="4">4 hours</option>
      <option value="24" selected>24 hours</option>
      <option value="168">7 days</option>
    </select>
    <button id="resetZoomBtn" onclick="resetHistoryZoom()" style="display:none">Reset zoom</button>
    <div style="position: relative; height: 320px;">
      <canvas id="historyChart"></canvas>
      <div id="historyZoomOverlay" style="position:absolute; top:0; bottom:0; background:rgba(232,86,47,0.15); border-left:1px solid var(--accent); border-right:1px solid var(--accent); display:none; pointer-events:none;"></div>
    </div>
    <div class="muted" style="font-size:0.8em; margin-top:4px;">Drag on the chart to zoom into a time range.</div>
  </div>

  <div class="panel">
    <h2>Fan curve</h2>
    <canvas id="curveChart" style="max-height: 220px"></canvas>
    <table id="curveTable"></table>
    <button onclick="addPoint()">+ Add point</button>
    <button onclick="saveCurve()">Save</button>
  </div>
{% endblock %}
{% block scripts %}
<script>
async function refreshStatus() {
  const r = await fetch('/api/status');
  const s = await r.json();
  document.getElementById('cpuTemp').textContent = s.cpu_temp != null ? s.cpu_temp.toFixed(1) + '°C' : '–';
  document.getElementById('diskTemp').textContent = s.disk_temp != null ? s.disk_temp.toFixed(1) + '°C' : '–';
  document.getElementById('diskCount').textContent = s.disk_count || 0;
  document.getElementById('effTemp').textContent = s.effective_temp != null ? s.effective_temp.toFixed(1) + '°C' : '–';
  document.getElementById('fanPct').textContent = s.fan_percent != null ? Math.round(s.fan_percent) + '%' : '–';
  document.getElementById('errorBox').textContent = s.last_error || '';
}

let chart;
let historyLabels = [];
let historyZoomRange = null; // [startLabel, endLabel] or null for full range
let historyDragStartX = null;

async function refreshHistory() {
  const hours = document.getElementById('rangeSelect').value;
  const r = await fetch('/api/history?hours=' + hours);
  const data = await r.json();
  const labels = data.map(d => new Date(d.ts + 'Z').toLocaleTimeString());
  const eff = data.map(d => d.effective_temp);
  const fan = data.map(d => d.fan_percent);
  historyLabels = labels;

  if (chart) chart.destroy();
  const ctx = document.getElementById('historyChart').getContext('2d');
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Temp (°C)', data: eff, borderColor: '#e8562f', yAxisID: 'y', tension: 0.2, pointRadius: 0, pointHitRadius: 8 },
        { label: 'Fan (%)', data: fan, borderColor: '#4da3ff', yAxisID: 'y1', tension: 0.2, pointRadius: 0, pointHitRadius: 8 },
      ],
    },
    options: {
      maintainAspectRatio: false,
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: { tooltip: { mode: 'index', intersect: false } },
      scales: {
        x: {},
        y: {
          position: 'left',
          title: { display: true, text: 'Temp (°C)', color: '#e8562f' },
          ticks: { color: '#e8562f' },
          grid: { color: 'rgba(232, 86, 47, 0.12)' },
        },
        y1: {
          position: 'right',
          title: { display: true, text: 'Fan (%)', color: '#4da3ff' },
          ticks: { color: '#4da3ff' },
          grid: { drawOnChartArea: false },
        },
      },
    },
  });
  applyHistoryZoom();
}

function applyHistoryZoom() {
  if (!chart) return;
  const btn = document.getElementById('resetZoomBtn');
  if (historyZoomRange) {
    chart.options.scales.x.min = historyZoomRange[0];
    chart.options.scales.x.max = historyZoomRange[1];
    btn.style.display = '';
  } else {
    delete chart.options.scales.x.min;
    delete chart.options.scales.x.max;
    btn.style.display = 'none';
  }
  chart.update();
}

function resetHistoryZoom() {
  historyZoomRange = null;
  applyHistoryZoom();
}

function setupHistoryZoomDrag() {
  const canvas = document.getElementById('historyChart');
  const overlay = document.getElementById('historyZoomOverlay');

  canvas.addEventListener('mousedown', (e) => {
    if (!chart) return;
    const rect = canvas.getBoundingClientRect();
    historyDragStartX = e.clientX - rect.left;
    overlay.style.left = historyDragStartX + 'px';
    overlay.style.width = '0px';
    overlay.style.display = 'block';
  });

  canvas.addEventListener('mousemove', (e) => {
    if (historyDragStartX === null) return;
    const rect = canvas.getBoundingClientRect();
    const currentX = e.clientX - rect.left;
    overlay.style.left = Math.min(historyDragStartX, currentX) + 'px';
    overlay.style.width = Math.abs(currentX - historyDragStartX) + 'px';
  });

  const endDrag = (e) => {
    if (historyDragStartX === null || !chart) return;
    const rect = canvas.getBoundingClientRect();
    const endX = e.clientX - rect.left;
    overlay.style.display = 'none';

    if (Math.abs(endX - historyDragStartX) > 10) { // ignore accidental tiny drags/clicks
      const startLabel = chart.scales.x.getValueForPixel(historyDragStartX);
      const endLabel = chart.scales.x.getValueForPixel(endX);
      const [a, b] = [startLabel, endLabel].sort((x, y) => x - y);
      historyZoomRange = [historyLabels[a], historyLabels[b]];
      applyHistoryZoom();
    }
    historyDragStartX = null;
  };
  canvas.addEventListener('mouseup', endDrag);
  canvas.addEventListener('mouseleave', () => {
    historyDragStartX = null;
    overlay.style.display = 'none';
  });
}

let curve = [];
const CURVE_TEMP_SNAP = 1; // snap to whole degrees, not a coarse grid

let curveChart;
let curveDragIndex = null;

function renderCurveChart() {
  const points = [...curve]
    .sort((a, b) => a.temp - b.temp)
    .map(p => ({ x: p.temp, y: p.percent }));
  if (curveChart) curveChart.destroy();
  curveDragIndex = null;
  const canvas = document.getElementById('curveChart');
  const ctx = canvas.getContext('2d');
  curveChart = new Chart(ctx, {
    type: 'line',
    data: {
      datasets: [{
        label: 'Fan %',
        data: points,
        borderColor: '#e8562f',
        backgroundColor: '#e8562f',
        tension: 0,
        pointRadius: 5,
        pointHoverRadius: 7,
        pointHitRadius: 10,
      }],
    },
    options: {
      parsing: false,
      animation: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { type: 'linear', title: { display: true, text: 'Temp (°C)' }, min: 0 },
        y: { title: { display: true, text: 'Fan %' }, min: 0, max: 100 },
      },
    },
  });

  // Hand-rolled drag: assigning to on* (not addEventListener) so re-rendering
  // the chart replaces the handler instead of stacking a new one each time —
  // the underlying <canvas> element is reused across renderCurveChart() calls.
  canvas.onmousedown = (e) => {
    const hit = curveChart.getElementsAtEventForMode(e, 'nearest', { intersect: true }, false);
    if (hit.length) {
      curveDragIndex = hit[0].index;
      canvas.style.cursor = 'grabbing';
    }
  };
  canvas.onmousemove = (e) => {
    if (curveDragIndex === null) return;
    const rect = canvas.getBoundingClientRect();
    let temp = curveChart.scales.x.getValueForPixel(e.clientX - rect.left);
    let percent = curveChart.scales.y.getValueForPixel(e.clientY - rect.top);
    temp = Math.max(0, Math.round(temp / CURVE_TEMP_SNAP) * CURVE_TEMP_SNAP);
    percent = Math.max(0, Math.min(100, Math.round(percent)));
    curveChart.data.datasets[0].data[curveDragIndex] = { x: temp, y: percent };
    curveChart.update('none');
  };
  const endDrag = () => {
    if (curveDragIndex === null) return;
    curveDragIndex = null;
    canvas.style.cursor = '';
    curve = curveChart.data.datasets[0].data
      .map(p => ({ temp: p.x, percent: p.y }))
      .sort((a, b) => a.temp - b.temp);
    renderCurveTableOnly();
  };
  canvas.onmouseup = endDrag;
  canvas.onmouseleave = endDrag;
}

function updatePoint(i, field, value) {
  curve[i][field] = parseFloat(value);
  renderCurveChart();
}

function renderCurveTableOnly() {
  const table = document.getElementById('curveTable');
  table.innerHTML = '<tr><th>Temp (°C)</th><th>Fan (%)</th><th></th></tr>';
  curve.forEach((p, i) => {
    const row = document.createElement('tr');
    row.innerHTML = `
      <td><input type="number" value="${p.temp}" onchange="updatePoint(${i}, 'temp', this.value)"></td>
      <td><input type="number" value="${p.percent}" onchange="updatePoint(${i}, 'percent', this.value)"></td>
      <td><button onclick="removePoint(${i})">x</button></td>`;
    table.appendChild(row);
  });
}

function renderCurveTable() {
  renderCurveTableOnly();
  renderCurveChart();
}

function addPoint() {
  const usedTemps = curve.map(p => p.temp);
  let temp = 50;
  while (usedTemps.includes(temp)) temp += CURVE_TEMP_SNAP;
  curve.push({ temp, percent: 30 });
  renderCurveTable();
}

function removePoint(i) {
  curve.splice(i, 1);
  renderCurveTable();
}

async function saveCurve() {
  await fetch('/api/curve', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(curve),
  });
}

async function loadCurve() {
  const r = await fetch('/api/curve');
  curve = await r.json();
  renderCurveTable();
}

document.getElementById('rangeSelect').addEventListener('change', () => {
  historyZoomRange = null; // switching ranges starts fresh
  refreshHistory();
});
setupHistoryZoomDrag();

loadCurve();
refreshStatus();
refreshHistory();
setInterval(refreshStatus, 5000);
setInterval(refreshHistory, 60000);
</script>
{% endblock %}
